<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auto-container">
    <div class="model-card">
      <div class="model-header">
        <h2>Login</h2>
      </div>

      <div class="model-body">
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="Enter username" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginpassword" class="form-input" placeholder="Enter password" required>
          </div>

          <button type="button" class="btn btn-primary" onclick="loginUser()">Login</button>
        </form>
      </div>

      <div class="model-footer">
        <div style="margin-top: 1rem;"></div>
        <p style="margin-bottom: 0.5rem;">
          Don't have an acount?
        </p>
        <button class="btn btn-secondary" onclick="goToSignup()">Sign Up</button>
      </div>
    </div>
  </div>
  <script src="script1.js"></script>
</body>

</html>
