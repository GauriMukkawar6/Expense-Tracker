<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="auto-container">
    <div class="model-card">

      <div class="model-header">
        <h2>Sign Up</h2>
      </div>

      <div class="model-body">
        <form id="signupForm">

          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="signupUsername" class="form-input" placeholder="Enter username" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="signupPassword" class="form-input" placeholder="Enter password" required>
          </div>

          <div class="form-group">
            <label class="form-label">Initail Income</label>
            <input type="number" id="signupIncome" class="form-input" placeholder="Enter Income" required>
          </div>

          <div class="model-footer">
            <button type="button" class="btn btn-secondary" onclick="goToLogin()">Login</button>
            <button type="submit" class="btn btn-primary">Sign Up</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="script1.js"></script>
</body>

</html>
